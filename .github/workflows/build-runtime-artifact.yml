name: Build Runtime Artifact

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-runtime:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and stage runtime artifact
        run: npm run artifact:build

      - name: Upload runtime artifact
        uses: actions/upload-artifact@v4
        with:
          name: auth-visualizer-runtime-${{ github.sha }}
          path: artifacts/runtime
          if-no-files-found: error
          retention-days: 7
