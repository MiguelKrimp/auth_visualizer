name: Release Runtime Artifact

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-runtime:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and stage runtime artifact
        run: npm run artifact:build

      - name: Create release archive
        run: |
          mkdir -p release
          cd artifacts/runtime
          zip -r ../../release/auth-visualizer-runtime-${{ github.ref_name }}.zip .

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/auth-visualizer-runtime-${{ github.ref_name }}.zip
